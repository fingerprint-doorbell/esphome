# Fingerprint Doorbell ESPHome Package
# Include this in your device configuration via packages:
#
#   packages:
#     fingerprint_doorbell: github://claudio-walser/esphome-fingerprint-doorbell/fingerprint-doorbell.yaml@main
#
# Required substitutions in your device config:
#   - api_encryption_key


# External components
external_components:
  - source:
      type: git
      url: https://github.com/fingerprint-doorbell/esphome
      ref: v1.1.6
    components: [ fingerprint_doorbell ]
    refresh: 0s
esphome:
  libraries:
    - "adafruit/Adafruit Fingerprint Sensor Library@^2.1.0"

# Web server for REST API endpoints
# REST API available at /fingerprint/*
#   GET  /fingerprint/list       - List all fingerprints
#   GET  /fingerprint/status     - Get sensor status
#   POST /fingerprint/enroll     - Start enrollment (?id=X&name=Y)
#   POST /fingerprint/cancel     - Cancel enrollment
#   POST /fingerprint/delete     - Delete fingerprint (?id=X)
#   POST /fingerprint/delete_all - Delete all fingerprints
#   POST /fingerprint/rename     - Rename fingerprint (?id=X&name=Y)

# Fingerprint doorbell component
# R503 sensor connected via Serial2 (GPIO16=RX, GPIO17=TX)
fingerprint_doorbell:
  id: fp_doorbell
  touch_pin: GPIO5     # Touch ring input (white wire)
  doorbell_pin: GPIO19 # Output when no match (doorbell event)
  ignore_touch_ring: false
  api_token: ${api_encryption_key}  # Protects REST API endpoints

  # Matrix Keypad 4x3 configuration
  # Standard matrix: rows drive LOW, columns read with pullup
  # * = confirm PIN, # = lock action
  keypad_row_pins:
    - GPIO25  # ROW1 (1,2,3) - Green wire - PAD 2
    - GPIO18  # ROW2 (4,5,6) - Red wire - PAD 7
    - GPIO26  # ROW3 (7,8,9) - Orange wire - PAD 6
    - GPIO22  # ROW4 (*,0,#) - Purple wire - PAD 4
  keypad_col_pins:
    - GPIO32  # COL1 (1,4,7,*) - Blue wire - PAD 3
    - GPIO27  # COL2 (2,5,8,0) - Yellow wire - PAD 1
    - GPIO21  # COL3 (3,6,9,#) - White wire - PAD 5

  # LED configuration (colors: red, blue, purple)
  # LED modes: breathing, flashing, on, off, gradual_on, gradual_off
  # LED speed: 0-255 (lower = faster)

  # Ready state (idle, waiting for finger)
  led_ready_color: blue
  led_ready_mode: "on"
  led_ready_speed: 0

  # Scanning state (finger detected, scanning in progress)
  led_scanning_color: blue
  led_scanning_mode: flashing
  led_scanning_speed: 25

  # Match state (fingerprint matched or enrollment pass complete)
  led_match_color: purple
  led_match_mode: "on"
  led_match_speed: 0

  # No match state (fingerprint not recognized, doorbell ring)
  led_no_match_color: red
  led_no_match_mode: "on"
  led_no_match_speed: 0

  # Error state
  led_error_color: red
  led_error_mode: flashing
  led_error_speed: 25

  # Enrollment state (waiting for finger during enrollment)
  led_enroll_color: purple
  led_enroll_mode: flashing
  led_enroll_speed: 25

  # Unlock action minimum confidence (0-255, default 80)
  # Fingerprint must have at least this confidence to trigger unlock
  # PIN codes always trigger unlock regardless of this setting
  min_unlock_confidence: 80


# Sensors
sensor:
  - platform: fingerprint_doorbell
    fingerprint_doorbell_id: fp_doorbell
    match_id:
      name: "Fingerprint Match ID"
      id: fp_match_id
    confidence:
      name: "Fingerprint Confidence"
      id: fp_confidence

text_sensor:
  - platform: fingerprint_doorbell
    fingerprint_doorbell_id: fp_doorbell
    match_name:
      name: "Fingerprint Match Name"
      id: fp_match_name
    enroll_status:
      name: "Enrollment Status"
      id: fp_enroll_status
    last_action:
      name: "Last Action"
      id: fp_last_action
    pin_match_name:
      name: "PIN Match Name"
      id: fp_pin_match_name

binary_sensor:
  - platform: fingerprint_doorbell
    fingerprint_doorbell_id: fp_doorbell
    ring:
      name: "Doorbell Ring"
      id: fp_ring
    finger:
      name: "Finger Detected"
      id: fp_finger
    pin_invalid:
      name: "PIN Invalid"
      id: fp_pin_invalid
    lock_action:
      name: "Lock Action"
      id: fp_lock_action
    unlock_action:
      name: "Unlock Action"
      id: fp_unlock_action
